backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "portfolio_settings"
    label: "Agency Manager"
    files:
      - label: "1. Basic & SEO Settings"
        name: "settings"
        file: "settings.json"
        fields:
          - {label: "Site Name", name: "site_name", widget: "string", default: "Adarsh Mishra Official"}
          - {label: "SEO Description", name: "seo_desc", widget: "string", default: "High-CTR Thumbnails & YouTube Growth Agency"}
          - {label: "Social Share Photo (URL)", name: "share_img", widget: "image"}
          - {label: "Calendly Link (Step 5)", name: "calendly_link", widget: "string", default: "https://calendly.com/your-username"}

      - label: "2. Auto Gallery"
        name: "gallery"
        file: "projects.json"
        fields:
          - {label: "Items", name: "items", widget: "list", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Image", name: "image", widget: "image", required: false}, {label: "YT Link", name: "yt_link", widget: "string", required: false}, {label: "Desc", name: "desc", widget: "text"}]}
              
      - label: "3. Affiliate Hub (Tools)"
        name: "tools"
        file: "tools.json"
        fields:
          - {label: "Tools", name: "items", widget: "list", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Desc", name: "desc", widget: "text"}, {label: "Link", name: "link", widget: "string"}, {label: "Btn", name: "btn_text", widget: "string", default: "Get Access"}]}

      - label: "4. Before & After"
        name: "before_after"
        file: "before_after.json"
        fields:
          - {label: "Items", name: "items", widget: "list", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Before", name: "before_img", widget: "image"}, {label: "After", name: "after_img", widget: "image"}, {label: "Desc", name: "desc", widget: "text"}]}

      - label: "5. Case Studies"
        name: "case_studies"
        file: "case_studies.json"
        fields:
          - {label: "Items", name: "items", widget: "list", fields: [{label: "Headline", name: "headline", widget: "string"}, {label: "Niche", name: "niche", widget: "string"}, {label: "Graph", name: "graph_img", widget: "image"}, {label: "Strategy", name: "strategy", widget: "text"}]}

      - label: "6. SEO Blog Articles"
        name: "blog"
        file: "blog.json"
        fields:
          - {label: "Blog Posts", name: "items", widget: "list", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Main Image", name: "image", widget: "image"}, {label: "Content", name: "content", widget: "markdown"}, {label: "Affiliate Link", name: "aff_link", widget: "string", required: false}]}
