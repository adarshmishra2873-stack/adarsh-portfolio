backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "portfolio_settings"
    label: "My Portfolio"
    files:
      - label: "Auto Gallery"
        name: "gallery"
        file: "projects.json"
        fields:
          - label: "Upload Content"
            name: "items"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Select Photo/Video", name: "image", widget: "image", required: false}
              - {label: "YouTube Video Link", name: "yt_link", widget: "string", required: false}
              - {label: "Short Description", name: "desc", widget: "text"}
              
      - label: "Secret Tools (Earnings)"
        name: "tools"
        file: "tools.json"
        fields:
          - label: "Add Your Affiliate Tools"
            name: "items"
            widget: "list"
            fields:
              - {label: "Tool Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Your Affiliate Link", name: "link", widget: "string"}
              - {label: "Button Text", name: "btn_text", widget: "string", default: "Get It Here"}

      - label: "Before & After (CTR Boost)"
        name: "before_after"
        file: "before_after.json"
        fields:
          - label: "Add Transformations"
            name: "items"
            widget: "list"
            fields:
              - {label: "Project Title (e.g. Tech Channel Boost)", name: "title", widget: "string"}
              - {label: "Before Image (Old Thumbnail)", name: "before_img", widget: "image"}
              - {label: "After Image (Your New Thumbnail)", name: "after_img", widget: "image"}
              - {label: "Result/Description (e.g. CTR increased from 2% to 10%)", name: "desc", widget: "text"}
