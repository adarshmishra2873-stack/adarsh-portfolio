backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "portfolio_settings"
    label: "My Portfolio"
    files:
      - label: "Auto Gallery"
        name: "gallery"
        file: "projects.json"
        fields:
          - label: "Upload Photos Here"
            name: "items"
            widget: "list"
            fields:
              - {label: "Photo Title", name: "title", widget: "string"}
              - {label: "Select Image", name: "image", widget: "image"}
